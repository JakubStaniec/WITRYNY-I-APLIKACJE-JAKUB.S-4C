<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="okej.css">
</head>
<body>
    <header>
        <h1>Flexboxy</h1>
    </header>
    <main>
        <img src="9817391023808791242.png" alt="">
        <h1>justify-content: flex-end;</h1>
        <h3>flex-start (domyślnie); flex-end; center; space-between; space-around; space-evenly</h3>
        <div id="panel1" class="justify-flex-end">
            <div><img class="robux" src="R.jpg" alt=""></div>
            <div><img class="robux" src="R.jpg" alt=""></div>
            <div><img class="robux" src="R.jpg" alt=""></div>
        </div>
        <h1>align-items: flex-end;</h1>
        <h3>flex-start flex-end center baseline stretch (default)</h3>
        <div id="panel1" class="align-flex-end">
           
            <div><img class="robux" src="R.jpg" alt=""></div>
            <div><img class="robux" src="R.jpg" alt=""></div>
            <div><img class="robux" src="R.jpg" alt=""></div>
        </div>
         <h1>flex-direction: row-reverse</h1>
        <h3>row (default) row-reverse column column-reverse</h3>
        <div id="panel1" class="flex-row-reverse">
           
            <div><img class="robux" src="R.jpg" alt=""></div>
            <div><img class="robux" src="R.jpg" alt=""></div>
            <div><img class="robux" src="R.jpg" alt=""></div>
        </div>
    </main>
</body>
</html>
